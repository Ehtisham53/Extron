<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extron | Join the Future</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #020617; height: 100vh; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; position: relative; }
        #bgCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        .container { text-align: center; z-index: 1; padding: 20px; width: 100%; }
        .animate-in { animation: fadeIn 1.5s ease-in-out; }
        h1 { font-size: 5rem; margin-bottom: 10px; background: linear-gradient(to right, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.2rem; color: #94a3b8; margin-bottom: 40px; }
        .input-group { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        input { padding: 18px 25px; width: 340px; border-radius: 50px; border: 1px solid rgba(59, 130, 246, 0.5); background: rgba(15, 23, 42, 0.5); color: white; outline: none; backdrop-filter: blur(5px); }
        button { padding: 18px 30px; width: 340px; border-radius: 50px; border: none; background: linear-gradient(to right, #3b82f6, #8b5cf6); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { box-shadow: 0 0 20px rgba(59, 130, 246, 0.6); }
        #successBox { display: none; opacity: 0; }
        .success-icon { font-size: 3rem; color: #10b981; margin-bottom: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="animate-in">

    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <h1>Extron</h1>
        <p>Building the next generation of decentralized crypto ecosystems.</p>
        
        <div class="input-group" id="inputGroup">
            <input type="email" id="email" placeholder="Enter your email for early access">
            <button onclick="saveEmail()">Get Access</button>
        </div>
        
        <div id="successBox">
            <div class="success-icon">✓</div>
            <h2 style="color: white;">You're In!</h2>
            <p>You've secured your spot in the future of decentralized finance.</p>
            <div style="margin-top: 20px; background: rgba(59, 130, 246, 0.1); padding: 15px; border-radius: 15px; border: 1px dashed #3b82f6; max-width: 340px; margin-left: auto; margin-right: auto;">
                <p style="font-size: 0.9rem; margin-bottom: 10px; color: white;">Your Invite Link:</p>
                <input type="text" id="refLink" value="" readonly style="width: 100%; margin-bottom: 10px; border: none; background: #020617; text-align: center; color: #3b82f6;">
                <button onclick="copyLink()" style="width: 100%; padding: 10px; font-size: 0.8rem;">Copy Link</button>
            </div>
            <p style="margin-top: 15px; font-size: 0.9rem; color: #64748b;">Friends Invited: <span id="refCount">0</span></p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        for(let i = 0; i < 80; i++) {
            particles.push({ x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight, size: Math.random() * 2, speedX: (Math.random() - 0.5) * 0.5, speedY: (Math.random() - 0.5) * 0.5 });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function copyLink() {
            const copyText = document.getElementById("refLink");
            copyText.select();
            document.execCommand("copy");
            alert("Link copied to clipboard!");
        }
    </script>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyDTjEyjZsz9s3UqqvgddRbW7NmKn_artsM",
          authDomain: "extron-33a52.firebaseapp.com",
          projectId: "extron-33a52",
          storageBucket: "extron-33a52.firebasestorage.app",
          messagingSenderId: "887807272793",
          appId: "1:887807272793:web:24dd160ae31728b157ce48",
          measurementId: "G-5ST9PZ7H8D"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function getRefCode() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('ref');
        }

        async function saveEmail() {
            const email = document.getElementById('email').value;
            const btn = document.querySelector('button');
            const inputGroup = document.getElementById('inputGroup');
            const successBox = document.getElementById('successBox');
            const refCodeFromURL = getRefCode();

            if(email && email.includes('@')) {
                btn.innerText = "Processing...";
                
                try {
                    const userRef = await db.collection("waitlist").add({
                        email: email,
                        referrer: refCodeFromURL || "none",
                        referralCount: 0,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    if (refCodeFromURL) {
                        const referrerDoc = db.collection("waitlist").doc(refCodeFromURL);
                        referrerDoc.update({
                            referralCount: firebase.firestore.FieldValue.increment(1)
                        });
                    }

                    document.getElementById('refLink').value = "extron.app/?ref=" + userRef.id;
                    inputGroup.style.display = "none";
                    successBox.style.display = "block";
                    successBox.style.animation = "fadeIn 1.5s ease-in-out forwards";
                } catch (error) {
                    alert("Error: " + error.message);
                    btn.innerText = "Get Access";
                }
            } else {
                alert("Please enter a valid email.");
            }
        }
    </script>
</body>
</html>
