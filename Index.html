    <!-- CANVAS FLOATING PARTICLES LOGIC -->
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        for(let i = 0; i < 80; i++) {
            particles.push({ 
                x: Math.random() * window.innerWidth, 
                y: Math.random() * window.innerHeight, 
                size: Math.random() * 2, 
                speedX: (Math.random() - 0.5) * 0.5, 
                speedY: (Math.random() - 0.5) * 0.5 
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(59, 130, 246, 0.3)';
            particles.forEach(p => {
                p.x += p.speedX; p.y += p.speedY;
                if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>

                dashboardPage.classList.remove('hidden');
                document.getElementById('display-name').innerText = user.displayName;
                
                // Show Admin Button if UID matches (Safe Check)
                const adminBtn = document.getElementById('admin-toggle-btn');
                if(user.uid === ADMIN_UID && adminBtn) {
                    adminBtn.classList.remove('hidden');
                }

                // Referral Link Logic
                const currentUrl = window.location.origin + window.location.pathname;
                document.getElementById('ref-link').innerText = `${currentUrl}?ref=${user.uid}`;
                
                // Real-time User Data Listener (Wrapped securely in try-catch)
                db.collection('users').doc(user.uid).onSnapshot(doc => {
                    try {
                        if (doc.exists) {
                            const data = doc.data();
                            document.getElementById('ext-balance').innerText = data.ext_balance || 0;
                            document.getElementById('ref-count').innerText = data.referralCount || 0;
                            userCompletedTasks = data.completedTasks || [];
                            
                            // Render Daily Check-in Card (Live updates from firebase data)
                            renderDailyCheckIn(data);

                            // User updates hone par list reload karein, bina naye read operation ke
                            if (currentTasksSnap) {
                                loadUserTasks(currentTasksSnap);
                            }
                        }
                    } catch (err) {
                        console.error("Rendering user snapshot failed: ", err);
                    }
                }, error => {
                    console.error("Firestore user snapshot subscription error: ", error);
                });

                // Real-time Tasks Listener (Single Read Source with safe catching)
                db.collection('tasks').onSnapshot(snap => {
                    try {
                        currentTasksSnap = snap; 
                        loadUserTasks(snap); 
                        if(user.uid === ADMIN_UID) {
                            updateAdminTaskList(snap);
                        }
                    } catch (err) {
                        console.error("Rendering tasks failed: ", err);
                    }
                }, error => {
                    console.error("Firestore tasks snapshot subscription error: ", error);
                });

            } else {
                loginPage.classList.remove('hidden');
                dashboardPage.classList.add('hidden');
            }
        });

        // USER REGISTRATION / CHECK WITH DEVICE LOCK PROTECTION
        async function checkUserEntry(user) {
            const urlParams = new URLSearchParams(window.location.search);
            const referredBy = urlParams.get('ref');
            const userRef = db.collection('users').doc(user.uid);
            const doc = await userRef.get();

            if (!doc.exists) {
                // Device Check Key
                const deviceKey = `ext_device_reg`;
                const hasRegisteredOnDevice = localStorage.getItem(deviceKey);

                await userRef.set({
                    name: user.displayName,
                    email: user.email,
                    ext_balance: 0,
                    completedTasks: [],
                    referralCount: 0,
                    invitedBy: referredBy || null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isDeviceValid: !hasRegisteredOnDevice, // False inside Firestore means device abuse detected
                    lastCheckInDay: 0,
                    checkInStreak: 0
                });

                // Set browser memory key
                localStorage.setItem(deviceKey, 'true');

                // Credit Referral Bonus ONLY IF this is a clean new device registration
                if (referredBy && referredBy !== user.uid && !hasRegisteredOnDevice) {
                    db.collection('users').doc(referredBy).update({
                        ext_balance: firebase.firestore.FieldValue.increment(50),
                        referralCount: firebase.firestore.FieldValue.increment(1)
                    }).catch(e => console.error("Referral update failed"));
                } else if (hasRegisteredOnDevice) {
                    console.log("Referral bonus skipped: Same device register detected.");
                }
            }
        }

        // --- DYNAMIC DAILY CHECK-IN CARD RENDER ---
        function renderDailyCheckIn(data) {
            const container = document.getElementById('check-in-card');
            if (!container) return;

            // Global Day index calculated using standard UTC epoch days
            // Resets exactly at UTC 12:00 AM (which is PKT 5:00 AM)
            const currentEpochDay = Math.floor(Date.now() / 86400000);
            let streak = data.checkInStreak || 0;
            let lastDay = data.lastCheckInDay || 0;

            const alreadyCheckedInToday = (currentEpochDay === lastDay);
            const isStreakBroken = (lastDay > 0 && currentEpochDay > lastDay + 1);
            
            // If they missed at least one calendar day, reset streak to 0 locally before next check-in
            if (isStreakBroken && !alreadyCheckedInToday) {
                streak = 0; 
            }

            const rewards = [10, 15, 20, 25, 30, 40, 50];

            let circlesHtml = "";
            for (let i = 0; i < 7; i++) {
                let circleClass = "check-circle-locked";
                let circleContent = "";

                if (alreadyCheckedInToday) {
                    if (i < streak) {
                        circleClass = "check-circle-done";
                        circleContent = `
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width: 14px; height: 14px;">
                                <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" />
                            </svg>`;
                    } else {
                        circleClass = "check-circle-locked";
                        circleContent = `${i + 1}`;
                    }
                } else {
                    if (i < streak) {
                        circleClass = "check-circle-done";
                        circleContent = `
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" style="width: 14px; height: 14px;">
                                <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" />
                            </svg>`;
                    } else if (i === streak) {
                        circleClass = "check-circle-active";
                        circleContent = `${i + 1}`;
                    } else {
                        circleClass = "check-circle-locked";
                        circleContent = `${i + 1}`;
                    }
                }

                circlesHtml += `
                    <div class="check-circle ${circleClass}">
                        ${circleContent}
                        <span class="day-reward-label">+${rewards[i]}</span>
                    </div>`;
            }

            let buttonHtml = "";
            if (alreadyCheckedInToday) {
                buttonHtml = `
                    <button disabled style="width: 100% !important; background: rgba(30, 41, 59, 0.4) !important; border: 1px solid rgba(255, 255, 255, 0.05) !important; color: #64748b !important; padding: 13px !important; border-radius: 50px !important; font-size: 11px !important; font-weight: bold !important; cursor: not-allowed !important; letter-spacing: 0.05em; text-transform: uppercase;">
                        Checked in for today
                    </button>`;
            } else {
                buttonHtml = `
                    <button onclick="claimDailyCheckIn()" class="gradient-btn" style="width: 100% !important; padding: 13px !important; border-radius: 50px !important; font-size: 11px !important; font-weight: bold !important; cursor: pointer !important; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2) !important; letter-spacing: 0.05em; text-transform: uppercase;">
                        Claim Day ${streak + 1} Reward
                    </button>`;
            }

            container.innerHTML = `
                <div class="check-in-title">Daily Check-in</div>
                <div class="circles-row">${circlesHtml}</div>
                <div style="margin-top: 25px !important;">${buttonHtml}</div>`;
        }

        // --- SUBMIT DAILY CHECK-IN CLAIM TO FIREBASE ---
        async function claimDailyCheckIn() {
            const user = auth.currentUser;
            if (!user) return;

            showLoader(true);
            try {
                const userRef = db.collection('users').doc(user.uid);
                const userDoc = await userRef.get();
                if (!userDoc.exists) return;

                const data = userDoc.data();
                const currentEpochDay = Math.floor(Date.now() / 86400000);
                let streak = data.checkInStreak || 0;
                let lastDay = data.lastCheckInDay || 0;

                // Double Check-in prevention
                if (currentEpochDay === lastDay) {
                    alert("You have already checked in today!");
                    return;
                }

                // Determine new streak progress
                let newStreak = streak;
                const isStreakBroken = (lastDay > 0 && currentEpochDay > lastDay + 1);

                if (isStreakBroken || streak >= 7) {
                    newStreak = 1; // Reset to Day 1 on inactivity or completing Day 7
                } else {
                    newStreak = streak + 1; // Continue progress
                }

                // Rewards calculation based on day list
                const rewards = [10, 15, 20, 25, 30, 40, 50];
                const rewardAmount = rewards[newStreak - 1];

                // Write to Firestore database
                await userRef.update({
                    ext_balance: firebase.firestore.FieldValue.increment(rewardAmount),
                    lastCheckInDay: currentEpochDay,
                    checkInStreak: newStreak
                });

                alert(`Successfully checked in! Day ${newStreak} reward of +${rewardAmount} EXT has been credited.`);
            } catch (e) {
                alert("Check-in failed: " + e.message);
            } finally {
                showLoader(false);
            }
        }

        // LOAD TASKS FOR USERS (Direct inline-styles used for bulletproof side-by-side display)
        function loadUserTasks(snap) {
            const container = document.getElementById('tasks-list');
            if (!snap) return;
            container.innerHTML = "";
            
            snap.forEach(doc => {
                const task = doc.data();
                const taskId = doc.id;
                const isDone = userCompletedTasks.includes(taskId);
                
                let actionBtn = "";
                if (isDone) {
                    actionBtn = `<button class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-6 py-2.5 rounded-full text-[10px] font-bold tracking-wider cursor-default">Claimed ✓</button>`;
                } else {
                    // Check Local Storage for active timer
                    const timerKey = `timer_${auth.currentUser?.uid || ''}_${taskId}`;
                    const savedEndTime = localStorage.getItem(timerKey);
                    
                    if (savedEndTime) {
                        const remaining = Math.ceil((savedEndTime - Date.now()) / 1000);
                        if (remaining > 0) {
                            actionBtn = `<button class="bg-slate-800/80 text-slate-400 border border-slate-700/50 px-6 py-2.5 rounded-full text-[10px] font-bold cursor-wait">Wait ${remaining}s</button>`;
                            // background mein resume karein timer
                            setTimeout(() => {
                                runTimer(taskId, remaining);
                            }, 50);
                        } else {
                            actionBtn = `<button onclick="claimTask('${taskId}')" class="bg-gradient-to-r from-emerald-500 to-teal-400 text-slate-950 px-6 py-2.5 rounded-full text-[10px] font-extrabold animate-bounce shadow-lg shadow-emerald-500/20 tracking-wider">Claim Now</button>`;
                        }
                    } else {
                        actionBtn = `<button id="btn-${taskId}" onclick="startTask('${taskId}', '${task.target_url}')" class="gradient-btn text-white px-6 py-2.5 rounded-full text-[10px] font-bold active:scale-95 transition-all shadow-lg shadow-blue-500/10 tracking-wider">Start</button>`;
                    }
                }

                // Direct CSS styling written inline so it is forced to be side-by-side no matter what!
                container.innerHTML += `
                    <div class="task-row">
                        <div class="task-details">
                            <p class="font-bold text-slate-200 text-sm tracking-wide break-words leading-tight">${task.task_name}</p>
                            <p class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400 font-extrabold text-[10px] mt-1.5 italic tracking-widest">+${task.reward} EXT</p>
                        </div>
                        <div id="container-${taskId}" class="task-action">${actionBtn}</div>
                    </div>`;
            });
        }

        // START TASK TIMER (Local Storage persistent)
        function startTask(taskId, link) {
            window.open(link, '_blank');
            const user = auth.currentUser;
            if (!user) return;

            const duration = 30; // 30 seconds wait time
            const endTime = Date.now() + (duration * 1000);
            
            const timerKey = `timer_${user.uid}_${taskId}`;
            localStorage.setItem(timerKey, endTime);

            runTimer(taskId, duration);
        }

        // RUN TIMER UTILITY
        function runTimer(taskId, timeLeft) {
            const btnContainer = document.getElementById(`container-${taskId}`);
            if (!btnContainer) return;

            // Purane chalte hue timer interval ko clear karein
            if (activeIntervals[taskId]) {
                clearInterval(activeIntervals[taskId]);
            }

            activeIntervals[taskId] = setInterval(() => {
                const currentContainer = document.getElementById(`container-${taskId}`);
                if (currentContainer) {
                    currentContainer.innerHTML = `<button class="bg-slate-800/80 text-slate-400 border border-slate-700/50 px-6 py-2.5 rounded-full text-[10px] font-bold cursor-wait">Wait ${timeLeft}s</button>`;
                }
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(activeIntervals[taskId]);
                    delete activeIntervals[taskId];
                    if (currentContainer) {
                        currentContainer.innerHTML = `<button onclick="claimTask('${taskId}')" class="bg-gradient-to-r from-emerald-500 to-teal-400 text-slate-950 px-6 py-2.5 rounded-full text-[10px] font-extrabold animate-bounce shadow-lg shadow-emerald-500/20 tracking-wider">Claim Now</button>`;
                    }
                }
            }, 1000);
        }

        // CLAIM REWARD (With Double-Claiming & Exploit Protection)
        async function claimTask(taskId) {
            const user = auth.currentUser;
            if (!user) return;

            // Security Check: Pehle se completed hai to claim na hone de
            if (userCompletedTasks.includes(taskId)) {
                alert("You have already completed this task!");
                return;
            }

            try {
                showLoader(true);
                
                // Clear localStorage timer safely
                const timerKey = `timer_${user.uid}_${taskId}`;
                localStorage.removeItem(timerKey);

                // Fetch task details to get authentic reward value
                const taskDoc = await db.collection('tasks').doc(taskId).get();
                if (!taskDoc.exists) {
                    alert("Task not found.");
                    return;
                }
                const reward = taskDoc.data().reward || 0;

                await db.collection('users').doc(user.uid).update({
                    ext_balance: firebase.firestore.FieldValue.increment(Number(reward)),
                    completedTasks: firebase.firestore.FieldValue.arrayUnion(taskId)
                });
            } catch (e) {
                alert("Error claiming reward: " + e.message);
            } finally {
                showLoader(false);
            }
        }

        // ADMIN: TOGGLE VIEW
        function toggleAdminView() {
            const mainView = document.getElementById('main-content-view');
            const adminView = document.getElementById('admin-view');
            const btn = document.getElementById('admin-toggle-btn');
            
            if(!mainView || !adminView || !btn) return;

            if(adminView.classList.contains('hidden')) {
                adminView.classList.remove('hidden');
                mainView.classList.add('hidden');
                btn.innerText = "Close Admin";
                btn.className = "text-[10px] bg-slate-800 text-white px-4 py-2 rounded-full font-bold uppercase transition-all border border-slate-700";
            } else {
                adminView.classList.add('hidden');
                mainView.classList.remove('hidden');
                btn.innerText = "Admin";
                btn.className = "text-[10px] bg-gradient-to-r from-blue-500 to-purple-500 text-white px-4 py-2 rounded-full font-bold uppercase shadow-lg shadow-blue-500/20";
            }
        }

        // ADMIN: SAVE NEW TASK (Updated with clean Success Confirmation)
        async function saveTask() {
            const nameInput = document.getElementById('admin-task-name');
            const urlInput = document.getElementById('admin-task-url');
            const rewardInput = document.getElementById('admin-task-reward');

            if(!nameInput.value || !urlInput.value || !rewardInput.value) {
                return alert("Please fill all fields!");
            }

            showLoader(true);
            try {
                await db.collection('tasks').add({
                    task_name: nameInput.value,
                    target_url: urlInput.value,
                    reward: Number(rewardInput.value),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Success Confirmation
                alert("Task posted successfully!");

                // Reset Form
                nameInput.value = "";
                urlInput.value = "";
                rewardInput.value = "";
            } catch (e) {
                alert("Failed to add task: " + e.message);
            } finally {
                showLoader(false);
            }
        }

        // ADMIN: UPDATE DELETE LIST
        function updateAdminTaskList(snap) {
            const list = document.getElementById('admin-tasks-list');
            if(!list) return;
            list.innerHTML = "";
            snap.forEach(doc => {
                const task = doc.data();
                list.innerHTML += `
                <div style="display: flex !important; flex-direction: row !important; justify-content: space-between !important; align-items: center !important; gap: 15px !important; background: rgba(15, 23, 42, 0.45) !important; border: 1px solid rgba(59, 130, 246, 0.2) !important; backdrop-filter: blur(8px) !important; padding: 15px !important; border-radius: 1.2rem !important; margin-bottom: 10px !important; width: 100% !important;">
                    <div style="flex: 1 !important; min-width: 0 !important; text-align: left !important; padding-right: 12px !important;">
                        <p class="font-bold text-slate-200 text-xs break-words leading-tight">${task.task_name}</p>
                        <p class="text-[9px] text-blue-400 font-mono mt-1">${task.reward} EXT</p>
                    </div>
                    <button onclick="deleteTask('${doc.id}')" class="bg-red-500/15 hover:bg-red-500 border border-red-500/25 hover:border-transparent text-red-400 hover:text-white px-4 py-2 rounded-full text-[10px] font-bold transition-all shrink-0">Delete</button>
                </div>`;
            });
        }

        // ADMIN: DELETE TASK
        async function deleteTask(id) {
            if(confirm("Are you sure you want to delete this task?")) {
                showLoader(true);
                try {
                    await db.collection('tasks').doc(id).delete();
                } catch (e) {
                    alert("Delete failed: " + e.message);
                } finally {
                    showLoader(false);
                }
            }
        }

        // UTILS: SHOW TAB (Toggles local CSS classes active/inactive smoothly, handles Balance Card and Daily Check-in visibility)
        function showTab(tab) {
            const tasksSection = document.getElementById('tasks-section');
            const referSection = document.getElementById('refer-section');
            const tasksBtn = document.getElementById('tab-tasks-btn');
            const referBtn = document.getElementById('tab-refer-btn');
            const balanceCard = document.getElementById('balance-card'); 
            const checkInCard = document.getElementById('check-in-card'); // Target Daily Check-in Card

            if(tab === 'tasks') {
                if(tasksSection) tasksSection.classList.remove('hidden');
                if(referSection) referSection.classList.add('hidden');
                if(balanceCard) balanceCard.classList.remove('hidden'); // Show balance card on tasks tab
                if(checkInCard) checkInCard.classList.remove('hidden'); // Show daily check-in card on tasks tab
                if(tasksBtn) tasksBtn.className = "tab-menu-btn tab-btn-active";
                if(referBtn) referBtn.className = "tab-menu-btn tab-btn-inactive";
            } else {
                if(tasksSection) tasksSection.classList.add('hidden');
                if(referSection) referSection.classList.remove('hidden');
                if(balanceCard) balanceCard.classList.add('hidden'); // Hide balance card on referral tab
                if(checkInCard) checkInCard.classList.add('hidden'); // Hide daily check-in card on referral tab
                if(referBtn) referBtn.className = "tab-menu-btn tab-btn-active";
                if(tasksBtn) tasksBtn.className = "tab-menu-btn tab-btn-inactive";
            }
        }

        // UTILS: COPY REFERRAL
        function copyRef() {
            const link = document.getElementById('ref-link').innerText;
            navigator.clipboard.writeText(link).then(() => {
                alert("Referral link copied!");
            });
        }

        // AUTH: LOGIN & LOGOUT
        async function login() {
            showLoader(true);
            try {
                await auth.signInWithPopup(provider);
            } catch (e) {
                alert("Login failed: " + e.message);
            } finally {
                showLoader(false);
            }
        }

        // LOGOUT WITH LOCAL TIMERS CLEANUP
        function logout() {
            if(confirm("Logout from Extron?")) {
                // Logout se pehle background timers ko clear karein
                for (let key in activeIntervals) {
                    clearInterval(activeIntervals[key]);
                }
                activeIntervals = {};
                auth.signOut();
            }
        }

        // UI: LOADER
        function showLoader(status) {
            if(status) {
                loader.classList.remove('hidden');
            } else {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
